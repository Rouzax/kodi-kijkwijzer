# Kodi JSON-RPC connection
kodi:
  url: "http://localhost:8080/jsonrpc"
  # username: ""   # uncomment if Kodi requires authentication
  # password: ""

# API keys
tmdb:
  api_key: ""

omdb:
  api_key: ""

# Rating configuration
rating:
  prefix: "Rated "
  target_country: "NL"
  fallback_rating: "NR"     # rating for movies no source can resolve (empty string to skip)
  inference_countries:
    - BE    # Belgium — same Kijkwijzer system
    - DE    # Germany — FSK, very similar
    - AT    # Austria — similar to DE
    - FR    # France — geographically close
    - GB    # UK — BBFC, decent middle ground
    - DK    # Denmark — Nordic neighbor
    - SE    # Sweden — Nordic, similar values
    - US    # Last resort — different philosophy
  mappings:
    BE:
      "AL": "AL"
      "6": "6"
      "9": "9"
      "12": "12"
      "14": "14"
      "16": "16"
      "18": "18"
    DE:
      "0": "AL"
      "6": "6"
      "12": "12"
      "16": "16"
      "18": "18"
    AT:
      "0": "AL"
      "6": "6"
      "10": "9"
      "12": "12"
      "14": "14"
      "16": "16"
      "18": "18"
    FR:
      "U": "AL"
      "10": "9"
      "12": "12"
      "16": "16"
      "18": "18"
    GB:
      "U": "AL"
      "PG": "6"
      "12A": "12"
      "12": "12"
      "15": "16"
      "18": "18"
    DK:
      "A": "AL"
      "7": "6"
      "11": "12"
      "15": "16"
    SE:
      "Btl": "AL"
      "7": "6"
      "11": "12"
      "15": "16"
    US:
      "G": "AL"
      "PG": "6"
      "PG-13": "12"
      "R": "16"
      "NC-17": "18"

options:
  dry_run: true
  rate_limit: 0.25
  retry_days: 30             # days to retry before applying fallback rating
  kijkwijzer: true           # scrape kijkwijzer.nl as fallback
  overrides_file: "overrides.yaml"    # manual rating overrides
  unresolved_file: "unresolved.json"  # legacy; tracker files now per media type
  # log_file: "backfill.log"        # optional: also write log to file
