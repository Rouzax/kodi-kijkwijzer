# Kodi JSON-RPC connection
kodi:
  url: "http://localhost:8080/jsonrpc"
  # username: ""   # uncomment if Kodi requires authentication
  # password: ""

# API keys
tmdb:
  api_key: ""

omdb:
  api_key: ""

# Rating configuration
rating:
  prefix: "Rated "
  target_country: "NL"
  fallback_rating: "NR"     # rating for movies no source can resolve (empty string to skip)
  inference_countries:
    - BE    # Belgium — same Kijkwijzer system
    - DE    # Germany — FSK, very similar
    - AT    # Austria — similar to DE
    - FR    # France — geographically close
    - GB    # UK — BBFC, decent middle ground
    - DK    # Denmark — Nordic neighbor
    - SE    # Sweden — Nordic, similar values
    - US    # Last resort — different philosophy
  mappings:
    BE:
      "AL": "AL"
      "6": "6"
      "9": "9"
      "12": "12"
      "14": "14"
      "16": "16"
      "18": "18"
    DE:
      "0": "AL"
      "6": "6"
      "12": "12"
      "16": "16"
      "18": "18"
    AT:
      "0": "AL"
      "6": "6"
      "10": "9"
      "12": "12"
      "14": "14"
      "16": "16"
      "18": "18"
    FR:
      "U": "AL"
      "10": "9"
      "12": "12"
      "16": "16"
      "18": "18"
    GB:
      "U": "AL"
      "PG": "6"
      "12A": "12"
      "12": "12"
      "15": "16"
      "18": "18"
    DK:
      "A": "AL"
      "7": "6"
      "11": "12"
      "15": "16"
    SE:
      "Btl": "AL"
      "7": "6"
      "11": "12"
      "15": "16"
    US:
      "G": "AL"
      "PG": "6"
      "PG-13": "12"
      "R": "16"
      "NC-17": "18"

options:
  dry_run: true              # preview changes without writing to Kodi (default: true)
  rate_limit: 0.25           # seconds to wait between API calls (respects rate limits)
  retry_days: 30             # days to keep retrying before applying fallback_rating
  kijkwijzer: true           # use kijkwijzer.nl as additional source (Tier 4)
  # log_file: "backfill.log"       # also write all output to this file

  # Per-type override files (create as needed):
  #   overrides_movies.yaml    — manual movie rating overrides
  #   overrides_tvshows.yaml   — manual TV show rating overrides
  #
  # Per-type tracker files (auto-managed, do not edit):
  #   unresolved_movies.json   — tracks movies waiting for a rating
  #   unresolved_tvshows.json  — tracks TV shows waiting for a rating
